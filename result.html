<!DOCTYPE html>
<html>
<head>
<title>AI Diagnosis Result</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container result-page">

<h1>🧠 AI Diagnosis Result</h1>

<div id="analysisBox">

<div class="scan-animation"></div>

<p id="loading">AI is analyzing your symptoms...</p>

</div>

<div class="result-card" id="resultCard" style="display:none">

<h2 id="diseaseName"></h2>

<div class="confidence-box">

<p>Confidence Level</p>

<div class="progress-bar">
<div class="progress" id="confidenceBar"></div>
</div>

<p id="confidenceText"></p>

</div>

<div class="tips">

<h3>💡 Health Tips</h3>

<ul id="tipsList">
<li>Stay hydrated</li>
<li>Get enough rest</li>
<li>Consult a doctor if symptoms worsen</li>
</ul>

</div>

</div>

<div class="buttons">

<button onclick="goBack()">🔄 Check Again</button>

<button onclick="shareResult()">📤 Share Result</button>

</div>

</div>

<script>

async function getPrediction(){

let symptoms = JSON.parse(localStorage.getItem("symptoms"));

let response = await fetch("http://127.0.0.1:5000/predict",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({symptoms:symptoms})

});

let data = await response.json();

document.getElementById("analysisBox").style.display="none";

document.getElementById("resultCard").style.display="block";

document.getElementById("diseaseName").innerText =
"Possible Disease: " + data.disease;

document.getElementById("confidenceText").innerText =
data.probability + "% confidence";

document.getElementById("confidenceBar").style.width =
data.probability + "%";

}

function goBack(){
window.location.href="index.html";
}

function shareResult(){

let text = document.getElementById("diseaseName").innerText;

navigator.clipboard.writeText(text);

alert("Result copied to clipboard!");

}

getPrediction();

</script>

</body>
</html>
