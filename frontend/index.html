<!DOCTYPE html>
<html>
<head>
<title>AI Symptom Checker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>AI Symptom Checker</h1>
<p>Select your symptoms</p>

<form id="symptomForm">

<div class="symptom-grid">

<label class="symptom">
<input type="checkbox" value="fever"> 🌡 Fever
</label>
<br>
<label class="symptom">
<input type="checkbox" value="cough"> 😷 Cough
</label>
<br>
<label class="symptom">
<input type="checkbox" value="headache"> 🤕 Headache
</label>
<br>
<label class="symptom">
<input type="checkbox" value="fatigue"> 😴 Fatigue
</label>
<br>
<label class="symptom">
<input type="checkbox" value="vomiting"> 🤢 Vomiting
</label>
<br>
<label class="symptom">
<input type="checkbox" value="sore_throat"> 🗣 Sore Throat
</label>
<br>
<label class="symptom">
<input type="checkbox" value="runny_nose"> 🤧 Runny Nose
</label>
<br>
<label class="symptom">
<input type="checkbox" value="chest_pain"> ❤️ Chest Pain
</label>
<br>
<label class="symptom">
<input type="checkbox" value="dizziness"> 🌀 Dizziness
</label>
<br>
<label class="symptom">
<input type="checkbox" value="body_pain"> 💢 Body Pain
</label>
<br>
</div>

<button type="submit">Check Disease</button>

</form>

</div>

<script>

document.getElementById("symptomForm").addEventListener("submit",function(e){

e.preventDefault();

let selected=[];

document.querySelectorAll("input[type='checkbox']:checked")
.forEach(cb => selected.push(cb.value));

localStorage.setItem("symptoms",JSON.stringify(selected));

window.location.href="result.html";

});

</script>

</body>
</html>
